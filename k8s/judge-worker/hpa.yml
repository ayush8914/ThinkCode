apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-worker
  labels:
    app: judge-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: judge-worker
  template:
    metadata:
      labels:
        app: judge-worker
    spec:
      containers:
      - name: judge-worker
        image: thinkcode/judge-worker:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: thinkcode-config
        - secretRef:
            name: thinkcode-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}