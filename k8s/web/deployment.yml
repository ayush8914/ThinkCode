# k8s/web-app.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: thinkcode-web-config
  labels:
    app: thinkcode-web
data:
  NEXT_PUBLIC_JUDGE_API_URL: "http://localhost:3008"
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: thinkcode-web-secrets
  labels:
    app: thinkcode-web
type: Opaque
stringData:
  # Databasegi 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thinkcode-web
  labels:
    app: thinkcode-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thinkcode-web
  template:
    metadata:
      labels:
        app: thinkcode-web
    spec:
      containers:
      - name: web
        image: ayush8914/thinkcode:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3005
          name: http
        envFrom:
        - configMapRef:
            name: thinkcode-web-config
        - secretRef:
            name: thinkcode-web-secrets
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
