apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-api
  labels:
    app: judge-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge-api
  template:
    metadata:
      labels:
        app: judge-api
    spec:
      containers:
      - name: judge-api
        image: thinkcode/judge-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - configMapRef:
            name: thinkcode-config
        - secretRef:
            name: thinkcode-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: judge-api
  namespace: thinkcode
spec:
  type: ClusterIP
  selector:
    app: judge-api
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http