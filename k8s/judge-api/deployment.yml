# k8s/judge-api.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: judge-api-config
  labels:
    app: judge-api
data:
  PORT: "3008"
  REDIS_HOST: "redis.thinkcode.svc.cluster.local"
  REDIS_PORT: "6379"
  DATABASE_URL: "postgresql://thinkcode:thinkcode123@postgres-service:5432/thinkcode?schema=public"
  NODE_ENV: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-api
  labels:
    app: judge-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge-api
  template:
    metadata:
      labels:
        app: judge-api
    spec:
      containers:
      - name: judge-api
        image: ayush8914/judge-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3008
          name: http
        envFrom:
        - configMapRef:
            name: judge-api-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3008
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: judge-api-service
  labels:
    app: judge-api
spec:
  type: ClusterIP
  ports:
    - port: 3008
      targetPort: 3008
      protocol: TCP
      name: http
  selector:
    app: judge-api